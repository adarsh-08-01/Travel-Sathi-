name: TravelSathi
options:
  bundleIdPrefix: com.travelsathi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  TravelSathi:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TravelSathi
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.travelsathi.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: TravelSathi/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    info:
      path: TravelSathi/Info.plist
      properties:
        CFBundleDisplayName: Travel Sathi
        CFBundleName: TravelSathi
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "Used to capture travel memories"
        NSLocationWhenInUseUsageDescription: "Used to show nearby places"
